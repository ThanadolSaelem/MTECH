name: AI Bugfix Agent

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r bugfix_agent/requirements.txt

      - name: Run AI bugfix agent
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GAS_URL:            ${{ secrets.GAS_URL }}
          GAS_API_KEY:        ${{ secrets.GAS_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python bugfix_agent/agent.py

      - name: Commit updated seen_errors.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bugfix_agent/seen_errors.json
          if git diff --cached --quiet; then
            echo "seen_errors.json unchanged — nothing to commit"
          else
            git commit -m "chore: update seen_errors.json [skip ci]"
            git push origin main
          fi
